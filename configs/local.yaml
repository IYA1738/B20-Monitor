app:
  name: "token-discover"
  env: "local"

idgen:
  worker_id: 1
  epoch_millis: 1704067200000 # 雪花 ID 起始时间戳，2024-01-01 00:00:00 UTC
  max_clock_backward_ms: 5

db:
  dsn: "host=127.0.0.1 user=postgres password=123456 dbname=token_discover port=5432 sslmode=disable TimeZone=Asia/Shanghai"
  max_open_conns: 80
  max_idle_conns: 40
  conn_max_lifetime_seconds: 1800
  conn_max_idle_time_seconds: 300
  ping_timeout_seconds: 5
  log_level: "warn"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 50
  min_idle_conns: 10
  dial_timeout_seconds: 5
  read_timeout_seconds: 3
  write_timeout_seconds: 3

elasticsearch:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""
  index_prefix: "token_discover"
  request_timeout_seconds: 10
  bulk_workers: 4
  bulk_batch_size: 500
  bulk_flush_interval_ms: 1000

chains:
  - name: "BaseSepolia"
    network: "base-sepolia"
    type: "evm"
    chain_id: 84532
    enabled: true

    # 没有 cursor 时从这里开始扫。
    # 测试阶段如果从 0 开始会追很久，可以改成想测试的最近区块。
    start_block: 43823419

    # 轻量级 reorg 防护：只扫 latest - confirmations 之前的块。
    confirmations: 3

    # 每个 eth_getLogs 查询覆盖多少块。
    chunk_size: 500

    rpc:
      urls:
        - "https://base-sepolia.drpc.org"
      timeout_seconds: 30
      max_concurrent_requests: 20
      requests_per_second: 15
      retry_max: 5
      retry_base_delay_ms: 500
      retry_max_delay_seconds: 30

    source:
      name: "b20-created-source"

      specs:
        - addresses:
            - "0xB20f000000000000000000000000000000000000"
          topics:
            - - "0xfd9bf2730513a1709722ff379a0844dfd8f997d600693c2bcc659e188bbdba0d"

      max_addresses_per_query: 100
      allow_empty_filter: false

    handler:
      fail_on_unmatched: false
      ignore_decode_error: false

      event_store:
        batch_size: 500

      decoders:
        - type: "b20_created"
          enabled: true
          params:
            factory: "0xB20f000000000000000000000000000000000000"
            topic0: "0xfd9bf2730513a1709722ff379a0844dfd8f997d600693c2bcc659e188bbdba0d"
            event_name: "b20_created"

      filters:
        - type: b20_creator_blacklist
          name: b20_creator-blacklist
          enabled: true

workers:
  fetch_workers: 10
  decode_workers: 20
  persist_workers: 4
  es_workers: 4
  notify_workers: 5
  queue_size: 10000

batch:
  event_batch_size: 500
  event_flush_interval_ms: 1000

  outbox_batch_size: 200
  outbox_flush_interval_ms: 1000

  es_batch_size: 500
  es_flush_interval_ms: 1000

notifier:
  telegram:
    enabled: true
    bot_token: "8678237094:AAF7Kn-IwXCqCDOBOsqoGKMoaIiJsVzcNdc"
    chat_id: "-1003751325790"
    request_timeout_seconds: 10
    max_concurrent_sends: 1

observability:
  log_level: "info"
  metrics: false
  tracing: false
