app:
 name: "token-discover"
 env: "local"

idgen:
  worker_id: 1
  epoch_millis: 1704067200000 # 雪花 ID 起始时间戳，2024-01-01 00:00:00 UTC
  max_clock_backward_ms: 5

db:
  dsn: "host=localhost user=postgres password=123456 dbname=token_discover port=5432 sslmode=disable TimeZone=Asia/Shanghai"
  max_open_conns: 80
  max_idle_conns: 40
  conn_max_lifetime_seconds: 1800
  conn_max_idle_time_seconds: 300
  ping_timeout_seconds: 5
  log_level: "warn"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 50
  min_idle_conns: 10
  dial_timeout_seconds: 5 # redis连接超时时间
  read_timeout_seconds: 3 # 读取redis响应超时时间
  write_timeout_seconds: 3 # 写redis命令超时时间

elasticsearch:
  addresses:
    - "http://localhost:9200" #es节点地址
  username: ""
  password: ""
  index_prefix: "token_discover"
  request_timeout_seconds : 10
  bulk_workers: 4 # ES bulk 写入worker数量
  bulk_batch_size: 500 # ES每批最多写入的文档数量
  bulk_flush_interval_ms: 1000 # ES写入最长等待时间 

chains:
 -name: "BaseSepolia"
 network: "base-sepolia"
 type: "evm"
 chain_id: 84532
 enabled: true
 start_block: 0 # 没有cursor的时候从哪里开始扫
 confirmations: 3
 chunk_size: 500 # 每次eth_getLogs拿多少块
 rpc:
  urls:
    - "https://base-sepolia.infura.io/v3/c8b8880b688449e098c268f568bf7700"
  timeout_second: 30
  max_concurrernt_requests: 20 # 最大并发RPC请求数量
  requests_per_second: 30 # RPC请求限制 防止429
  retry_max: 5
  retry_base_delay_ms: 500
  retry_max_delay_seconds: 30


workers:
  fetch_workers: 10 # 拉链上数据的worker数量
  decode_workers: 20 #解析日志/事件的worker数量
  persist_workers: 4 # 批量写Postgre的worker数量
  es_workers: 4 # 同步ES的worker数量
  notify_workers: 5 # 发送通知的worker数量
  queue_size: 10000 # pineline cannel/queue的默认容量

batch:
  event_batch_size: 500 # chain_events 每批最多写入数量
  event_flush_interval_ms: 1000 # chain_events最长等待时间
  outbox_batch_size: 200 # notification_outbox 每批处理数量
  es_batch_size: 500 # ES同步任务批处理量
  es_flush_interval_ms: 1000 # ES同步任务batch最长等待时间

notifier:
  telegram:
    enabled: false #是否推TG
    bot_token: ""
    request_timeout_seconds: 10
    max_concurrent_sends: 5 # 最大并发推送

observability:
  log_level: "info"
  metrics: false # 预留
  tracing: false # 预留



